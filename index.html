<script type="text/javascript">
 //数字按键跳转
    document.addEventListener("keydown", function(event) {
        if (event.key >= '1' && event.key <= '9') {
            var linkId = "link" + event.key;
            var link = document.getElementById(linkId);
            if (link) {
                window.open(link.href, '_blank');
            }
        }
    });

    // 显示/隐藏悬浮链接
	 var isLinksVisible = false; // 初始化链接状态为隐藏
   	 document.getElementById("showAdditionalLinks").addEventListener("click", function() {
        var floatingLinks = document.getElementById("floatingLinks");

        if (!isLinksVisible) {
            floatingLinks.style.display = "block";
            floatingLinks.classList.add("active"); // 添加 active 类名
        } else {
            floatingLinks.style.display = "none";
            floatingLinks.classList.remove("active"); // 移除 active 类名
        }

        isLinksVisible = !isLinksVisible; // 更新链接状态
  	  });
</script>
