<!DOCTYPE html>
<html>
<head>
  <title>地址提取</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    #输入框 {
      resize: both;
      overflow: auto;
      width: 80%;
      height: 150px;
      min-width: 300px;
      min-height: 100px;
    }
    .可复制 {
      cursor: pointer;
      user-select: all;
    }
    .notification {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #f2f2f2;
      padding: 10px 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      z-index: 999;
    }
  </style>
  <script>
    function 替换内容() {
      var 输入内容 = document.getElementById("输入框").value;
      var 替换后内容 = 输入内容.replace(/[:：]/g, "-");
      var 结果 = document.getElementById("结果");
      结果.innerHTML = 替换后内容.match(/[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}-[0-9A-Fa-f]{2}/g).map(function(item) {
        return '<span class="可复制" onclick="复制文本(this)">' + item + '</span>';
      }).join('<br>');
    }

    function 复制文本(element) {
      var 选择器 = window.getSelection();
      var 范围 = document.createRange();
      范围.selectNodeContents(element);
      选择器.removeAllRanges();
      选择器.addRange(范围);
      document.execCommand('copy');

      // Display div notification
      var notification = document.getElementById('notification');
      notification.innerText = '已复制到剪贴板: ' + element.innerText;
      notification.style.display = 'block';

      // Hide notification after 2 seconds
      setTimeout(function() {
        notification.style.display = 'none';
      }, 2000);
    }
  </script>
</head>
<body>
  <h1>mac地址提取</h1>
  <textarea id="输入框" placeholder="输入内容"></textarea><br>
  <button onclick="替换内容()">执行替换</button>
  <p>替换后的内容为：</p>
  <p id="结果"></p>

  <!-- Notification div -->
  <div id="notification" class="notification"></div>
</body>
</html>
