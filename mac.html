<!DOCTYPE html>
<html>
<head>
    <title>提取和修改 MAC 地址</title>
    <script>
        function clearInput() {
            var inputData = document.getElementById('inputData');
            if (inputData.value === "请输入地址进行替换") {
                inputData.value = "";
            }
        }

        function replacePlaceholder() {
            var inputData = document.getElementById('inputData');
            if (inputData.value === "") {
                inputData.value = "请输入地址进行替换";
            }
        }

        function extractAndReplace() {
            var inputData = document.getElementById('inputData').value;

            if (inputData === "请输入地址进行替换") {
                alert("请输入有效的数据进行操作。");
                return;
            }

            // 使用正则表达式匹配所有的 MAC 地址模式
            var macPattern = /[0-9a-fA-F]{2}(:[0-9a-fA-F]{2}){5}/g;
            var macAddresses = inputData.match(macPattern);

            var outputText = "";
            if (macAddresses) {
                outputText = "提取并修改的 MAC 地址:<br>";
                for (var i = 0; i < macAddresses.length; i++) {
                    var modifiedMAC = macAddresses[i].replace(/:/g, '-');

                    // 检查是否为全 0 或全 F 的 MAC 地址，如果是则跳过
                    if (modifiedMAC !== '00-00-00-00-00-00' && modifiedMAC !== 'ff-ff-ff-ff-ff-ff') {
                        outputText += "<input type='text' value='" + modifiedMAC + "' readonly><br>";
                    }
                }
            } else {
                outputText = "未找到匹配的 MAC 地址";
            }

            document.getElementById('outputMAC').innerHTML = outputText;
        }
    </script>
</head>
<body>
    <label for="inputData">输入数据:</label>
    <textarea id="inputData" rows="10" cols="50" onclick="clearInput()" onblur="replacePlaceholder()">请输入地址进行替换</textarea><br>
    <button onclick="extractAndReplace()">提取并修改 MAC 地址</button>
    <div id="outputMAC"></div>
</body>
</html>
