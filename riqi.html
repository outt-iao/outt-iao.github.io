<!DOCTYPE html>
<html>
<head>
  <title>日期推算</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    label, input, button {
      display: block;
      margin-bottom: 15px;
      width: 80%;
      max-width: 300px;
      padding: 10px;
      box-sizing: border-box;
      margin: 0 auto;
    }
    button {
      cursor: pointer;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #2980b9;
    }

    /* 响应式设计 - 在小屏幕上调整布局 */
    @media screen and (max-width: 600px) {
      label, input, button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
 <h2>系统日期不能超过机器日期</h2>
<h5>-_-16年的系统安装到14年的机器上会导致触摸失灵</h5>
  <label for="year">选择年份：</label>
  <input type="number" id="year" min="1900" max="2100">

  <label for="week">选择周数：</label>
  <input type="number" id="week" min="1" max="53">

  <button onclick="calculateDate()">计算日期</button>

  <p id="result"></p>

  <script src="script.js"></script>
</body>
</html>
