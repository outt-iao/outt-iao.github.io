<!DOCTYPE html>
<html>
<head>
  <title>日期推算</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    label, input, button {
      display: block;
      margin-bottom: 10px;
      width: 90%; /* 使用百分比设置宽度 */
      max-width: 300px;
      padding: 8px;
      box-sizing: border-box;
      margin: 0 auto; /* 水平居中 */
    }
    button {
      cursor: pointer;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <label for="year">选择年份：</label>
  <input type="number" id="year" min="1900" max="2100">

  <label for="week">选择周数：</label>
  <input type="number" id="week" min="1" max="53">

  <button onclick="calculateDate()">计算日期</button>

  <p id="result"></p >

  <script src="script.js"></script>
</body>
</html>
