<!DOCTYPE html>
<html>
<head>
  <title>记录并复制网页最终跳转链接</title>
</head>
<body>
  <ul>
    <li><a href="https://i-gd.meiyijia.com.cn/handler/AccountHander/JumpLoginPage.aspx?action=KFPT" class="link">页面 1</a></li>

  <script>
    var redirectedUrls = []; // 用于存储重定向的URL

    // 在地址栏变化时触发
    window.addEventListener('popstate', function(event) {
      var currentUrl = window.location.href;
      redirectedUrls.push(currentUrl);
      console.log('记录的重定向URL:', currentUrl);
    });

    // 模拟地址栏变化（仅供示例使用，实际情况是页面跳转触发）
    setTimeout(function() {
      window.history.pushState({}, '', 'https://www.finalurl.com'); // 模拟最终跳转到的URL
    }, 3000); // 模拟3秒后地址栏变化

    // 在这里可以进行页面跳转，例如：
    // window.location.href = 'https://www.finalurl.com';
  </script>

</body>
</html>
