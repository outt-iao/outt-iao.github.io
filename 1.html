<!DOCTYPE html>
<html>
<head>
  <title>记录并复制网页最终跳转链接</title>
</head>
<body>
  <ul>
    <li><a href="https://i-gd.meiyijia.com.cn/handler/AccountHander/JumpLoginPage.aspx?action=KFPT" class="link">页面 1</a></li>


  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const links = document.querySelectorAll('.link');

      links.forEach(function(link) {
        link.addEventListener('click', function(event) {
          // 阻止默认的跳转行为
          event.preventDefault();

          // 获取点击的链接地址
          const url = link.href;

          // 记录跳转信息
          console.log('跳转到：', url);

          // 在记录后进行页面跳转
          window.location.href = url;
        });
      });

      // 监听页面加载完成后的事件，页面跳转完成后执行获取最终链接并复制到剪贴板
      window.addEventListener('load', function() {
        const finalUrl = window.location.href;

        // 复制最终跳转后的链接到剪贴板
        navigator.clipboard.writeText(finalUrl)
          .then(function() {
            console.log('成功复制到剪贴板:', finalUrl);
          })
          .catch(function(err) {
            console.error('无法复制到剪贴板:', err);
          });
      });
    });
  </script>
</body>
</html>
