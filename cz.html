
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重装系统</title>
<style>

  /* 包裹文字和图片的容器 */
  .content {
    display: flex;
    flex-direction: column;
    margin-bottom: 30px;
    padding: 20px;
    background-color: #b3b3e5; /* 设定背景色 */
    border-radius: 8px; /* 圆角边框 */
  }
  .text {
    padding-bottom: 20px;
  }
  .text h2 {
    color: #333;
    margin-bottom: 5px; /* 添加标题下方间距 */
  }
  .text p {
    color: #666;
  }
  .image-container {
    position: relative;
  }

</style>
<link rel="stylesheet" href="https://at.alicdn.com/t/c/font_4428159_ml8wrdmsz9o.css" />
</head>
<body>

<div class="content">
   <h2>步骤1、先将收银机关机。找到F10键，手指放在F10上，一开机就一下一下快速点击</h2>
  <div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/cz/1.png" width="400" height="auto" alt="Keyboard Image"></div>
  </div>

<div class="content">

  <h2>步骤2、进入如图，方向键下选择USB ，回车</h2>

  <div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/cz/2.png" width="400" height="auto"></div>
 </div>
  
<div class="content">
  <h2>步骤3、进入如图，回车</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/cz/3.png" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤4、进入如图，输入y和回车, 再输入y和回车</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/cz/4.png" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤5、进入如图，选择关机直到黑屏后，拔掉u盘，重新开机</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/cz/5.png" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤6、请按 C 键 , 看屏幕提示Press C 就按C 键，出现了就要按，直到进入系统</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/cz/6.png" width="400" height="auto"></div>
</div>

</body>
</html>
