
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图文阅读</title>
<style>
/* 可选：用于演示目的的简单 CSS 样式 */
body {
font-family: Arial, sans-serif;
margin: 20px;
line-height: 1.6;
}
.content {
display: flex;
flex-direction: column;
margin-bottom: 30px;
}
.text {
padding-bottom: 20px;
}
.text h2 {
color: #333;
}
.text p {
color: #666;
}
.image-container {
align-self: center;
max-width: 100%;
}
img {
max-width: 100%;
height: auto;
border: 2px solid #333;
padding: 5px;
}
.red-text {
color: red;font-size: 18px;
font-size: 18px;
}
</style>
</head>
<body>

<div class="content">
<div class="text">
<h2>将U盘插入收银机任意一个 USB 口，找到删除键</h2>
</div>
<div class="image-container">
<img src="https://oos.admintop.top/raw/pic/1" alt="步骤1图片">

</div>
</div>

<div class="content">
<div class="text">
<h2>手指放在删除键上。开机，一直点删除键，直至进入下面这个界面就算成功。</h2>
<p>按<a class="red-text">方向键右</a>移动到boot <a class="red-text">方向键下</a>移动到U盘 按<a class="red-text">加号</a>将U盘移动到最上面</p>
</div>
<div class="image-container">
<img src="https://oos.admintop.top/raw/pic/2" alt="步骤2图片">
<img src="https://oos.admintop.top/raw/pic/3" alt="步骤2图片">
<img src="https://oos.admintop.top/raw/pic/4" alt="步骤2图片">
</div>
</div>

<div class="content">
<div class="text">
<h2>F10保存，自动重启</h2>

</div>
<div class="image-container">

<img src="https://oos.admintop.top/raw/pic/5" alt="步骤2图片">

</div>
<h2>回车，自动重启</h2>
</div>

<div class="image-container"><img src="https://oos.admintop.top/raw/pic/6" alt="步骤2图片"> </div>
<h2>回车</h2>

<div class="image-container"><img src="https://oos.admintop.top/raw/pic/7" alt="步骤2图片"> </div>
<h2>输入y，回车 再输入y，回车</h2>


<div class="image-container"><img src="https://oos.admintop.top/raw/pic/8" alt="步骤2图片"> </div>
<h2>到这里拔掉u盘，重新开机</h2>

<div class="image-container"><img src="https://oos.admintop.top/raw/pic/9" alt="步骤2图片"> </div>
<h2>提示你按C，你就一直按C 直到进入系统</h2>
<div class="image-container"><img src="https://oos.admintop.top/raw/pic/10" alt="步骤2图片"> </div>
<h2>远程连接提示允许 ，按方向键右 再按回车</h2>主屏没有就是再副屏
</div>
</body>
</html>
