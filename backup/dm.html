<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提取并复制代码</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-color: #f4f4f4;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 80%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            margin-bottom: 20px;
            box-sizing: border-box;
            vertical-align: top;
        }

        button {
            display: block;
            width: 80%;
            padding: 10px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #successMessage {
            display: none;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>在下方输入整个文件内容：</h2>
    <textarea id="inputText" placeholder="将整个文件内容粘贴到这里"></textarea>
    <button onclick="extractAndCopyCode()">提取并复制代码</button>
    <button onclick="clearText()">清空</button>
    <p id="successMessage">提取成功！</p>

    <script>
        function extractAndCopyCode() {
            const inputText = document.getElementById('inputText').value;

            // 使用正则表达式匹配代码部分
            const codePattern = /```(?:\w+)?\n([\s\S]+?)\n```/;
            const codeMatches = inputText.match(codePattern);

            // 如果匹配到代码部分，则显示成功消息
            if (codeMatches && codeMatches.length > 1) {
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);

                const extractedCode = codeMatches[1];
                console.log(extractedCode); // 这里可以将代码打印到控制台
            } else {
                console.log('未找到代码部分。');
            }
        }

        function clearText() {
            document.getElementById('inputText').value = '';
        }
    </script>
</body>
</html>
