<!DOCTYPE html>
<html>
	<head>
		<meta charset=UTF-8">
		<title>标题</title>
		<style type="text/css">
			a:link{
				text-decoration:none;
				color: #000080;	
			}
       
            		a:hover{
		              color: red;
		              text-decoration: underline;
		           		font-size: 1.9em;
		        }
		            
			a:focus {
				font-size:1.8em;
			}

           
		</style>
          <!--
          	link [a标签显示样式]
	             	去除下划线
	                字体颜色
         	hover [标悬浮样式]
	         	字体颜色
	                增加下滑线
	                字体变大
            	focus [鼠标点击样式]
             		字体变小
         -->
	</head>
	<body>
		<p style="text-indent:2em;">
		<a href="https://fast.com/zh/cn/#" target="_blank">测速</a>
		</p>
		<p style="text-indent:2em;">
		<a href="https://plugin.speedtest.cn/" target="_blank">测速</a>
		</p>
		<p style="text-indent:2em;">
		<a href="http://speed5.ntu.edu.tw/speed5/" target="_blank">台湾大学</a>
		</p>
		<p style="text-indent:2em;">
		<a href="http://speed.neu.edu.cn/" target="_blank">东北大学</a>
		</p>
		<p style="text-indent:2em;">
		<a href="https://iptv.tsinghua.edu.cn/st/" target="_blank">清华大学</a>
		</p>
		<p style="text-indent:2em;">
		<a href="http://test.ustc.edu.cn/" target="_blank">科技大学</a>
		</p>
	
		
		
				
	
	
	</body>
</html>
