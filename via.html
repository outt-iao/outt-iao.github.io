
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
	  margin-top: 20px; /* 调整上边距的数值，可以根据需要进行更改 */
	background-color: #cccccc; /* 浅灰色，可以根据需要调整颜色 */
	
    }



	@media (min-width: 768px) {
	  body {
		margin-top: 100px; /* 调整上边距的数值，可以根据需要进行更改 */
		margin-left: 20%; /* 左侧边距为20像素 */
		margin-right: 20%; /* 右侧边距为20像素 */
	  }
	}



    .icon-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: #3498db; /* 默认颜色，可以根据实际需要调整 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      margin-bottom: 5px;
    }

    .icon:hover {
      background-color: #2980b9;
    }

    .icon a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>

  <script>
    // 用于生成图标的数据
    const iconsData = [
      { link: 'https://kfwb.myj.com.cn/WeiXin/weihuyuan/First.aspx', title: '维护员任务' },
      { link: 'https://ditu.myj.com.cn/?from=groupmessage&isappinstalled=0', title: '分店地图' } ,
      { link: 'https://mposshop-gd.myj.com.cn/Account', title: '维护平台' },
      { link: 'https://iot-caixingapp.meiyijia.com.cn/index?code=pVrNoz', title: '云值守' },
      { link: 'https://icsp.myj.com.cn/html/quote/index.htm?i=1690863343', title: '配件价格表' },
      { link: 'http://tdoa.tiandy.com:6001/demo/reportJsp/showReport.jsp?raq=/customer_repair.raq', title: '零方监控' },
      { link: 'http://120.76.41.136/', title: '留言板' },
      { link: 'https://outt-iao.github.io/', title: '首页' },
	{ link: 'https://outt-iao.github.io/qr', title: '二维码' },
      { link: 'https://outt-iao.github.io/rq', title: '日期计算' },
	    { link: https://outt-iao.github.io/mac', title: 'mac地址提取' },
{ link: 'https://icsp.myj.com.cn/', title: '客服' },
	  
	  
	  
	  
	  
	  
      
      
      
      
      
      
      
      
    ];

    // 用于生成冷色调低调颜色
    function generateRandomColor() {
      const hue = Math.floor(Math.random() * 36) * 10; // 色相在0到350之间，每10度一档
      const saturation = Math.floor(Math.random() * 21) + 30; // 饱和度在30%到50%之间
      const lightness = Math.floor(Math.random() * 16) + 40; // 亮度在40%到55%之间
      return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    // 动态生成图标
    iconsData.forEach((iconData, index) => {
      const iconContainer = document.createElement('div');
      iconContainer.classList.add('icon-container');

      const icon = document.createElement('div');
      icon.classList.add('icon');
      icon.style.backgroundColor = generateRandomColor(); // 设置随机颜色
      icon.onclick = () => window.location.href = iconData.link;

      const link = document.createElement('a');
      link.href = iconData.link;
      link.textContent = iconData.title.charAt(0); // 使用标题的第一个字母作为图标内容

      icon.appendChild(link);
      iconContainer.appendChild(icon);

      const title = document.createElement('p');
      title.textContent = iconData.title;
      iconContainer.appendChild(title);

      document.body.appendChild(iconContainer);
    });
	
  </script>

</body>
</html>
