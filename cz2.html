
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重装系统</title>
<style>
 /*  https://www.iconfont.cn */
  /* 包裹文字和图片的容器 */
  .content {
    display: flex;
    flex-direction: column;
    margin-bottom: 30px;
    padding: 20px;
    background-color: #b3b3e5; /* 设定背景色 */
    border-radius: 8px; /* 圆角边框 */
  }
  .text {
    padding-bottom: 20px;
  }
  .text h2 {
    color: #333;
    margin-bottom: 5px; /* 添加标题下方间距 */
  }
  .text p {
    color: #666;
  }
  .image-container {
    position: relative;
  }

</style>

<link rel="stylesheet" href="https://at.alicdn.com/t/c/font_4428159_ml8wrdmsz9o.css" />
  
</head>
  
<body>

<div class="content">
   <h2>步骤1、将这些按键记住，等会要用。先关机,将u盘插入到收银机上</h2>
  <div class="image-container"><img src="https://cfoos.pages.dev/raw/tu/jianpan" width="400" height="auto" alt="Keyboard Image"></div></div>

<div class="content">

  <h2>步骤2、请找到 Del 键，先把手指放上去，开机一直戳Del键，进入如图</h2>
  <div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/22" width="400" height="auto"></div></div>
  
<div class="content">
  <h2>步骤3、请按 → 键移动到如图</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/tu/33" width="400" height="auto"></div>
</div>


<div class="content">
  <h2>步骤4、请按 ↓ 键移动到2这行，再按 + 键，2就变上去变成1。再按F10键</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/33" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤5、请按 <span class="iconfont icon-huichetijiao"> 键</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/44" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤6、请按 <span class="iconfont icon-huichetijiao"></span> 键</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/55" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤7、输入y和<span class="iconfont icon-huichetijiao"></span> 键, 再输入y和<span class="iconfont icon-huichetijiao"></span> 键</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/7" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤8、选择关机直到黑屏后，拔掉u盘，重新开机</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/8" width="400" height="auto"></div>
</div>

<div class="content">
  <h2>步骤9、请按 C 键 , 看屏幕提示Press C 就按C 键，出现了就要按，直到进入系统</h2>
<div class="image-container"><img src="https://cfoos.pages.dev/raw/pic/9" width="400" height="auto"></div>
</div>

</body>
</html>
